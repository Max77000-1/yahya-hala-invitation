<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>دعوة زفاف يحيى و حلا</title>
<meta property="og:title" content="دعوة زفاف يحيى و حلا">
<meta property="og:description" content="يسرّنا دعوتكم لحضور حفل الزفاف · السبت 20.06.2026">
<meta property="og:image" content="p1-hero.png">
<meta name="theme-color" content="#f3f1ec">
<style>
  :root{ --paper:#f4f2ed; --ink:#5b6b4f; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:system-ui,'Segoe UI',sans-serif;
    overflow-x:hidden;
  }

  /* عمود الدعوة، بعرض هاتف على الشاشات الكبيرة */
  .deck{
    width:min(92vw, 430px);
    margin:0 auto;
    padding-bottom:14vh;
  }

  .block{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:9vh 0;
    opacity:0;
    transform:translateY(48px) scale(.97);
    transition:opacity 1.05s ease, transform 1.2s cubic-bezier(.16,.84,.3,1);
    will-change:opacity,transform;
  }
  .block.in{ opacity:1; transform:none; }
  .block:first-child{ padding-top:8vh; }

  .block img{
    display:block;
    height:auto;
    user-select:none;
    -webkit-user-drag:none;
  }
  /* دمج خلفية القصاصات البيضاء مع الورق بسلاسة (للنصوص فقط) */
  .block.text img{ mix-blend-mode:multiply; }

  /* مقاسات الكتل بمقياس موحّد (نسبة عرضها إلى عرض الهيرو 802) */
  /* aspect-ratio يحجز ارتفاع كل صورة قبل تحميلها (حتى يقيس الكشف بدقّة) */
  img.w-hero    { width:100%;  aspect-ratio:802/818; border-radius:10px; box-shadow:0 16px 44px rgba(60,70,55,.20); }
  img.w-emblem  { width:30%;   aspect-ratio:240/362; }
  img.w-names   { width:56.5%; aspect-ratio:452/520; }
  img.w-details { width:43%;   aspect-ratio:344/644; }
  img.w-contacts{ width:46%;   aspect-ratio:370/370; }

  /* بريق ناعم يمرّ مرة عند الكشف */
  .block{position:relative;}
  .block .glow{
    position:absolute;inset:0;pointer-events:none;overflow:hidden;
  }
  .block .glow::before{
    content:"";position:absolute;top:0;bottom:0;width:60%;left:-60%;
    background:linear-gradient(115deg,transparent,rgba(255,255,255,.6),transparent);
  }
  .block.in .glow::before{ animation:sweep 1.3s ease .2s 1; }
  @keyframes sweep{to{left:120%;}}

  /* شريط التقدّم */
  .progress{position:fixed;top:0;left:0;height:3px;width:0;z-index:40;
    background:linear-gradient(90deg,#9aa886,#5b6b4f);transition:width .12s ease;}

  /* ملء الشاشة */
  .fsbtn{position:fixed;top:12px;inset-inline-end:12px;z-index:40;
    background:rgba(91,107,79,.85);backdrop-filter:blur(6px);border:none;color:#fff;
    width:34px;height:34px;border-radius:50%;cursor:pointer;display:grid;place-items:center;}
  .fsbtn svg{width:16px;height:16px;}

  /* تلميح التمرير */
  .hint{position:fixed;bottom:18px;left:0;right:0;z-index:40;text-align:center;
    pointer-events:none;animation:vanish 6s forwards;}
  .hint .pill{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--ink);
    background:rgba(255,255,255,.92);backdrop-filter:blur(6px);padding:6px 15px;border-radius:99px;
    box-shadow:0 5px 16px rgba(60,70,55,.16);animation:bob 1.9s ease-in-out infinite;}
  .hint svg{width:16px;height:16px;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
  @keyframes vanish{0%,72%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>
  <div class="progress" id="progress"></div>

  <main class="deck" id="deck">
    <section class="block"      data-eager><span class="glow"></span><img class="w-hero"     src="p1-hero.png"     alt="يحيى و حلا"></section>
    <section class="block text" data-eager><span class="glow"></span><img class="w-emblem"   src="p2-emblem.png"   alt=""></section>
    <section class="block text"><span class="glow"></span><img class="w-names"    src="p3-names.png"    alt="من نسب شريف طيب الأركان · حرم السيد الدكتور عبد الله الكتاني · حرم السيد الحاج عاصم هيبا · تتشرفان بدعوتكم لحضور حفل زفاف ولديهما · يحيى و حلا"></section>
    <section class="block text"><span class="glow"></span><img class="w-details"  src="p4-details.png"  alt="إن السرور إذا تشارك ضوعفت بسماته · يوم السبت 20.06.2026 · الساعة 8 · قصر الأب تاون مشروع دمر"></section>
    <section class="block text"><span class="glow"></span><img class="w-contacts" src="p5-contacts.png" alt="وإن حالت الظروف دون حضوركم نرجوا الاعتذار قبل 16-06-2026 · بيت الكتاني 0933255822 · بيت هيبا 0944663865"></section>
  </main>

  <button class="fsbtn" id="fs" aria-label="ملء الشاشة">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3m13-5v3a2 2 0 0 1-2 2h-3"/></svg>
  </button>

  <div class="hint" id="hint">
    <span class="pill">مرّر للأسفل لرؤية الدعوة
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </span>
  </div>

<script>
  // ابدأ دائماً من أعلى الدعوة
  if('scrollRestoration' in history) history.scrollRestoration='manual';
  scrollTo(0,0);

  const blocks=[...document.querySelectorAll('.block')];

  // الكشف عند دخول كل كتلة الثلثَ الأسفل من الشاشة (أي وأنت واصل لها)
  const io=new IntersectionObserver(es=>{
    es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
  },{ rootMargin:'0px 0px -22% 0px', threshold:0.15 });
  blocks.forEach(b=>io.observe(b));
  // الكتل الأولى المرئية فوراً
  requestAnimationFrame(()=>blocks.forEach(b=>{ if(b.hasAttribute('data-eager')) b.classList.add('in'); }));

  // شريط التقدّم
  const prog=document.getElementById('progress');
  addEventListener('scroll',()=>{
    const h=document.documentElement.scrollHeight-innerHeight;
    prog.style.width=(h>0?scrollY/h*100:0)+'%';
  },{passive:true});

  // ملء الشاشة
  document.getElementById('fs').addEventListener('click',()=>{
    if(!document.fullscreenElement) document.documentElement.requestFullscreen?.();
    else document.exitFullscreen?.();
  });
</script>
</body>
</html>
