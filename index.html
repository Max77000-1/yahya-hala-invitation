<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>دعوة زفاف يحيى و حلا</title>
<meta property="og:title" content="دعوة زفاف يحيى و حلا">
<meta property="og:description" content="يسرّنا دعوتكم لحضور حفل الزفاف · السبت 20.06.2026">
<meta property="og:image" content="invitation-full.jpg">
<meta name="theme-color" content="#5b6b4f">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{scroll-behavior:smooth;}
  body{
    background:#e9ece6;
    font-family:system-ui,'Segoe UI',sans-serif;
    color:#5b6b4f;
    overflow-x:hidden;
  }

  /* إطار الدعوة، بعرض هاتف على الشاشات الكبيرة */
  .frame{
    max-width:460px;
    margin:0 auto;
    background:#fff;
    box-shadow:0 20px 60px rgba(60,70,55,.18);
    position:relative;
  }

  /* كل قسم = شريحة من الصورة الطويلة، تُكشف عند التمرير */
  .band{
    position:relative;
    width:100%;
    aspect-ratio:1366 / 768;     /* 5 أقسام متساوية من 1366×3840 */
    overflow:hidden;
    opacity:0;
    transform:translateY(38px) scale(.985);
    transition:opacity 1s ease, transform 1.1s cubic-bezier(.16,.84,.3,1);
    will-change:opacity,transform;
  }
  .band.in{opacity:1;transform:none;}
  .band img{
    position:absolute;
    left:0;
    width:100%;
    display:block;
    user-select:none;
    -webkit-user-drag:none;
  }
  /* بريق ناعم يمرّ مرة عند ظهور القسم */
  .band::after{
    content:"";
    position:absolute;inset:0;
    background:linear-gradient(115deg,transparent 38%,rgba(255,255,255,.35) 50%,transparent 62%);
    transform:translateX(-130%);
    pointer-events:none;
  }
  .band.in::after{animation:sheen 1.3s ease .25s 1;}
  @keyframes sheen{to{transform:translateX(130%);}}

  /* مؤشّر التقدّم العلوي */
  .progress{
    position:fixed;top:0;left:0;height:3px;width:0;
    background:linear-gradient(90deg,#8a9a76,#5b6b4f);
    z-index:30;transition:width .15s ease;
  }

  /* زر ملء الشاشة */
  .fsbtn{
    position:fixed;top:12px;inset-inline-end:12px;z-index:30;
    background:rgba(91,107,79,.85);backdrop-filter:blur(6px);
    border:none;color:#fff;width:34px;height:34px;border-radius:50%;
    cursor:pointer;display:grid;place-items:center;
  }
  .fsbtn svg{width:16px;height:16px;}

  /* تلميح: مرّر / اكبس */
  .hint{
    position:fixed;bottom:18px;left:0;right:0;z-index:30;
    text-align:center;font-size:13px;color:#5b6b4f;
    pointer-events:none;
    animation:vanish 7s forwards;
  }
  .hint .pill{
    display:inline-flex;align-items:center;gap:6px;
    background:rgba(255,255,255,.85);backdrop-filter:blur(6px);
    padding:6px 14px;border-radius:99px;
    box-shadow:0 4px 14px rgba(60,70,55,.15);
    animation:bob 1.8s ease-in-out infinite;
  }
  .hint svg{width:16px;height:16px;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
  @keyframes vanish{0%,75%{opacity:1}100%{opacity:0}}

  /* منطقة الكبس للتنقّل على الموبايل (النصف السفلي = التالي) */
  .tapzone{
    position:fixed;left:0;right:0;bottom:0;height:42%;z-index:5;
    background:transparent;border:none;cursor:pointer;
  }
</style>
</head>
<body>
  <div class="progress" id="progress"></div>

  <div class="frame" id="frame"></div>

  <button class="fsbtn" id="fs" aria-label="ملء الشاشة">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3m13-5v3a2 2 0 0 1-2 2h-3"/></svg>
  </button>

  <button class="tapzone" id="tapzone" aria-label="القسم التالي"></button>

  <div class="hint" id="hint">
    <span class="pill">مرّر أو اكبس للأسفل
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </span>
  </div>

<script>
  const SRC = "invitation-full.jpg";
  const BANDS = 5;                 // 3840 / 768 = 5 أقسام متساوية
  const frame = document.getElementById('frame');

  // بناء الأقسام، كل قسم يعرض شريحته من الصورة نفسها
  const bands = [];
  for(let i=0;i<BANDS;i++){
    const b=document.createElement('div');
    b.className='band';
    const img=document.createElement('img');
    img.src=SRC;
    img.alt='دعوة يحيى و حلا - قسم '+(i+1);
    img.loading = i<2 ? 'eager' : 'lazy';
    img.style.top = (-i*100)+'%';   // إزاحة الصورة لإظهار الشريحة i
    b.appendChild(img);
    frame.appendChild(b);
    bands.push(b);
  }

  // حركة الكشف عند دخول كل قسم
  const io=new IntersectionObserver(es=>{
    es.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('in'); });
  },{threshold:.18, rootMargin:'0px 0px -12% 0px'});
  bands.forEach(b=>io.observe(b));
  // أول قسم يظهر فوراً
  requestAnimationFrame(()=>bands[0].classList.add('in'));

  // شريط التقدّم
  const prog=document.getElementById('progress');
  function onScroll(){
    const h=document.documentElement.scrollHeight-innerHeight;
    prog.style.width=(h>0 ? (scrollY/h*100) : 0)+'%';
  }
  addEventListener('scroll',onScroll,{passive:true});
  onScroll();

  // الكبس على الموبايل: انتقل للقسم التالي (مع التفاف عند النهاية)
  function bandHeight(){ return bands[0].getBoundingClientRect().height; }
  function goNext(){
    const bh=bandHeight();
    let idx=Math.round(scrollY/bh);
    const max=BANDS-1;
    idx = idx>=max ? 0 : idx+1;       // التفاف للبداية بعد آخر قسم
    scrollTo({top: idx*bh, behavior:'smooth'});
  }
  document.getElementById('tapzone').addEventListener('click',goNext);

  // أسهم لوحة المفاتيح
  addEventListener('keydown',e=>{
    const bh=bandHeight();
    let idx=Math.round(scrollY/bh);
    if(e.key==='ArrowDown'||e.key==='PageDown'||e.key===' '){e.preventDefault();scrollTo({top:Math.min(idx+1,BANDS-1)*bh,behavior:'smooth'});}
    if(e.key==='ArrowUp'||e.key==='PageUp'){e.preventDefault();scrollTo({top:Math.max(idx-1,0)*bh,behavior:'smooth'});}
  });

  // ملء الشاشة
  document.getElementById('fs').addEventListener('click',()=>{
    if(!document.fullscreenElement) document.documentElement.requestFullscreen?.();
    else document.exitFullscreen?.();
  });
</script>
</body>
</html>
