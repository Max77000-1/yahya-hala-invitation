<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>دعوة زفاف يحيى و حلا</title>
<meta property="og:title" content="دعوة زفاف يحيى و حلا">
<meta property="og:description" content="يسرّنا دعوتكم لحضور حفل الزفاف · السبت 20.06.2026">
<meta property="og:image" content="p1-hero.png">
<meta name="theme-color" content="#f3f1ec">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --paper:#f4f2ed; --ink:#5b6b4f; --ink-soft:#8a9676; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Cairo',system-ui,sans-serif;
    overflow-x:hidden;
  }

  /* عمود الدعوة، يملأ عرض الموبايل ويُحدَّد على الشاشات الكبيرة */
  .deck{
    width:min(100vw, 440px);
    margin:0 auto;
    padding:0 16px 16vh;
  }

  .block{
    display:flex;justify-content:center;align-items:center;
    padding:8vh 0;
    opacity:0;transform:translateY(48px) scale(.97);
    transition:opacity 1.05s ease, transform 1.2s cubic-bezier(.16,.84,.3,1);
    will-change:opacity,transform;position:relative;
  }
  .block.in{opacity:1;transform:none;}
  .block:first-child{padding-top:7vh;}

  .block img{display:block;height:auto;user-select:none;-webkit-user-drag:none;}
  .block.text img{mix-blend-mode:multiply;}

  /* مقاسات مكبّرة للموبايل */
  img.w-hero  { width:100%;  aspect-ratio:802/818; border-radius:12px; box-shadow:0 16px 44px rgba(60,70,55,.20); }
  img.w-emblem{ width:46%;   aspect-ratio:240/362; }
  img.w-names { width:96%;   aspect-ratio:452/520; }
  img.w-quote { width:74%;   aspect-ratio:344/408; }
  img.w-contacts{ width:94%; aspect-ratio:370/370; }

  /* بريق ناعم عند الكشف */
  .block .glow{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
  .block .glow::before{content:"";position:absolute;top:0;bottom:0;width:60%;left:-60%;
    background:linear-gradient(115deg,transparent,rgba(255,255,255,.6),transparent);}
  .block.in .glow::before{animation:sweep 1.3s ease .2s 1;}
  @keyframes sweep{to{left:120%;}}

  /* بطاقات التاريخ / الساعة / المكان */
  .cards{
    width:100%;
    display:flex;flex-direction:column;gap:16px;
    padding:6vh 0;
  }
  .card{
    display:flex;align-items:center;gap:16px;
    background:#fff;border-radius:18px;
    padding:16px 18px;
    box-shadow:0 10px 28px rgba(60,70,55,.10);
    border:1px solid rgba(91,107,79,.08);
    opacity:0;transform:translateY(34px) scale(.97);
    transition:opacity .7s ease, transform .85s cubic-bezier(.16,.84,.3,1);
    will-change:opacity,transform;
  }
  .cards.in .card{opacity:1;transform:none;}
  .cards.in .card:nth-child(1){transition-delay:.05s;}
  .cards.in .card:nth-child(2){transition-delay:.20s;}
  .cards.in .card:nth-child(3){transition-delay:.35s;}
  .card .ic{
    flex:0 0 auto;width:50px;height:50px;border-radius:50%;
    background:#eef1e8;color:var(--ink);
    display:grid;place-items:center;
  }
  .card .ic svg{width:25px;height:25px;}
  .card .tx{display:flex;flex-direction:column;gap:2px;}
  .card .lbl{font-size:13px;color:var(--ink-soft);font-weight:600;}
  .card .val{font-size:18px;color:var(--ink);font-weight:700;}

  /* شريط التقدّم */
  .progress{position:fixed;top:0;left:0;height:3px;width:0;z-index:40;
    background:linear-gradient(90deg,#9aa886,#5b6b4f);transition:width .12s ease;}

  /* ملء الشاشة */
  .fsbtn{position:fixed;top:12px;inset-inline-end:12px;z-index:40;
    background:rgba(91,107,79,.85);backdrop-filter:blur(6px);border:none;color:#fff;
    width:36px;height:36px;border-radius:50%;cursor:pointer;display:grid;place-items:center;}
  .fsbtn svg{width:17px;height:17px;}

  /* تلميح التمرير */
  .hint{position:fixed;bottom:18px;left:0;right:0;z-index:40;text-align:center;
    pointer-events:none;animation:vanish 6s forwards;}
  .hint .pill{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--ink);
    background:rgba(255,255,255,.92);backdrop-filter:blur(6px);padding:7px 16px;border-radius:99px;
    box-shadow:0 5px 16px rgba(60,70,55,.16);animation:bob 1.9s ease-in-out infinite;}
  .hint svg{width:16px;height:16px;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
  @keyframes vanish{0%,72%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>
  <div class="progress" id="progress"></div>

  <main class="deck" id="deck">
    <section class="block"      data-eager><span class="glow"></span><img class="w-hero"   src="p1-hero.png"   alt="يحيى و حلا"></section>
    <section class="block text" data-eager><span class="glow"></span><img class="w-emblem" src="p2-emblem.png" alt=""></section>
    <section class="block text"><span class="glow"></span><img class="w-names" src="p3-names.png" alt="من نسب شريف طيب الأركان · حرم السيد الدكتور عبد الله الكتاني · حرم السيد الحاج عاصم هيبا · تتشرفان بدعوتكم لحضور حفل زفاف ولديهما · يحيى و حلا"></section>
    <section class="block text"><span class="glow"></span><img class="w-quote" src="p4-quote.png" alt="إن السرور إذا تشارك ضوعفت بسماته مع زمرة الأحباب"></section>

    <!-- بطاقات الموعد والمكان، تظهر تباعاً مع التمرير -->
    <section class="cards" id="cards">
      <div class="card">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
        <span class="tx"><span class="lbl">التاريخ</span><span class="val">يوم السبت · 20.06.2026</span></span>
      </div>
      <div class="card">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 14"/></svg></span>
        <span class="tx"><span class="lbl">الساعة</span><span class="val">الثامنة مساءً</span></span>
      </div>
      <div class="card">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></span>
        <span class="tx"><span class="lbl">المكان</span><span class="val">قصر الأب تاون · مشروع دمر</span></span>
      </div>
    </section>

    <section class="block text"><span class="glow"></span><img class="w-contacts" src="p5-contacts.png" alt="وإن حالت الظروف دون حضوركم نرجوا الاعتذار قبل 16-06-2026 · بيت الكتاني 0933255822 · بيت هيبا 0944663865"></section>
  </main>

  <button class="fsbtn" id="fs" aria-label="ملء الشاشة">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3m13-5v3a2 2 0 0 1-2 2h-3"/></svg>
  </button>

  <div class="hint" id="hint">
    <span class="pill">مرّر للأسفل لرؤية الدعوة
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </span>
  </div>

<script>
  if('scrollRestoration' in history) history.scrollRestoration='manual';
  scrollTo(0,0);

  const items=[...document.querySelectorAll('.block, .cards')];
  const io=new IntersectionObserver(es=>{
    es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
  },{ rootMargin:'0px 0px -20% 0px', threshold:0.12 });
  items.forEach(b=>io.observe(b));
  requestAnimationFrame(()=>document.querySelectorAll('[data-eager]').forEach(b=>b.classList.add('in')));

  const prog=document.getElementById('progress');
  addEventListener('scroll',()=>{
    const h=document.documentElement.scrollHeight-innerHeight;
    prog.style.width=(h>0?scrollY/h*100:0)+'%';
  },{passive:true});

  document.getElementById('fs').addEventListener('click',()=>{
    if(!document.fullscreenElement) document.documentElement.requestFullscreen?.();
    else document.exitFullscreen?.();
  });
</script>
</body>
</html>
