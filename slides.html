<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>دعوة زفاف يحيى و حلا</title>
<meta property="og:title" content="دعوة زفاف يحيى و حلا">
<meta property="og:description" content="يسرّنا دعوتكم لحضور حفل الزفاف · السبت 20-06-2026">
<meta property="og:image" content="slide1.png">
<meta name="theme-color" content="#3f5779">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Cairo',system-ui,sans-serif;
    background:#1d2738;
    color:#fff;
    overflow:hidden;
  }

  /* المسار القابل للتمرير مع تثبيت كل صفحة */
  .scroller{
    height:100dvh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
    scroll-behavior:smooth;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .scroller::-webkit-scrollbar{display:none;}

  .page{
    position:relative;
    height:100dvh;
    scroll-snap-align:start;
    scroll-snap-stop:always;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    background:#1d2738;
  }

  /* خلفية ضبابية من نفس الصورة لملء الجوانب بأناقة */
  .page .bg{
    position:absolute;
    inset:0;
    background-size:cover;
    background-position:center;
    filter:blur(30px) brightness(.55);
    transform:scale(1.2);
  }

  /* الصورة كما هي + حركة الدخول */
  .page .card{
    position:relative;
    height:100%;
    width:100%;
    max-width:min(100vw, calc(100dvh * 9 / 16));
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    transform:translateY(48px) scale(.96);
    transition:opacity 1s ease, transform 1.1s cubic-bezier(.16,.84,.3,1);
  }
  .page.in .card{
    opacity:1;
    transform:translateY(0) scale(1);
  }
  .page .card img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  /* حركة Ken Burns بطيئة للصفحة النشطة فقط */
  .page.in .card img{
    animation:kb 9s ease-out forwards;
  }
  @keyframes kb{
    from{transform:scale(1.06);}
    to{transform:scale(1);}
  }

  /* بريق ناعم يمرّ مرة عند الظهور */
  .page .card::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(115deg,transparent 35%,rgba(255,255,255,.18) 50%,transparent 65%);
    transform:translateX(-120%);
    pointer-events:none;
  }
  .page.in .card::after{
    animation:sheen 1.4s ease .35s 1;
  }
  @keyframes sheen{to{transform:translateX(120%);}}

  /* مؤشّر الصفحات الجانبي */
  .dots{
    position:fixed;
    top:50%;
    inset-inline-start:12px;
    transform:translateY(-50%);
    z-index:10;
    display:flex;
    flex-direction:column;
    gap:9px;
  }
  .dots button{
    width:8px;height:8px;
    padding:0;border:none;
    border-radius:50%;
    background:rgba(255,255,255,.4);
    cursor:pointer;
    transition:all .3s;
  }
  .dots button.on{
    background:#fff;
    height:22px;
    border-radius:99px;
  }

  /* العدّاد + ملء الشاشة */
  .topbar{
    position:fixed;
    top:12px;left:12px;right:12px;
    z-index:10;
    display:flex;
    justify-content:space-between;
    align-items:center;
    pointer-events:none;
  }
  .counter{
    background:rgba(0,0,0,.32);
    backdrop-filter:blur(6px);
    padding:4px 12px;
    border-radius:99px;
    font-size:13px;font-weight:600;letter-spacing:.5px;
  }
  .fsbtn{
    pointer-events:auto;
    background:rgba(0,0,0,.32);
    backdrop-filter:blur(6px);
    border:none;color:#fff;
    width:32px;height:32px;border-radius:50%;
    cursor:pointer;display:grid;place-items:center;
  }
  .fsbtn svg{width:16px;height:16px;}

  /* تلميح التمرير */
  .scrollhint{
    position:fixed;
    bottom:18px;left:0;right:0;
    text-align:center;z-index:10;
    font-size:12px;color:rgba(255,255,255,.8);
    pointer-events:none;
    animation:bob 1.8s ease-in-out infinite, vanish 6s forwards;
  }
  .scrollhint svg{width:18px;height:18px;display:block;margin:2px auto 0;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}
  @keyframes vanish{0%,70%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>
  <div class="scroller" id="scroller"></div>

  <div class="topbar">
    <span class="counter" id="counter">1 / 8</span>
    <button class="fsbtn" id="fs" aria-label="ملء الشاشة">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3m13-5v3a2 2 0 0 1-2 2h-3"/></svg>
    </button>
  </div>

  <div class="dots" id="dots"></div>

  <div class="scrollhint">مرّر للأسفل
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
  </div>

<script>
  const IMAGES = [
    "slide1.png","slide2.png","slide3.png","slide4.png",
    "slide5.png","slide6.png","slide7.png","slide8.png"
  ];

  const scroller  = document.getElementById('scroller');
  const dotsEl    = document.getElementById('dots');
  const counterEl = document.getElementById('counter');

  const pages = IMAGES.map((src,i)=>{
    const p=document.createElement('section');
    p.className='page';
    p.innerHTML=`<div class="bg" style="background-image:url('${src}')"></div>
                 <div class="card"><img src="${src}" alt="سلايد ${i+1}" loading="${i<2?'eager':'lazy'}"></div>`;
    scroller.appendChild(p);

    const d=document.createElement('button');
    if(i===0) d.classList.add('on');
    d.addEventListener('click',()=>p.scrollIntoView({behavior:'smooth'}));
    dotsEl.appendChild(d);
    return p;
  });
  const dots=[...dotsEl.children];

  // حركة الدخول + تحديث المؤشّر عبر IntersectionObserver
  const io=new IntersectionObserver((entries)=>{
    entries.forEach(en=>{
      const i=pages.indexOf(en.target);
      if(en.isIntersecting){
        en.target.classList.add('in');
        if(en.intersectionRatio>0.6){
          counterEl.textContent=(i+1)+' / '+pages.length;
          dots.forEach((d,j)=>d.classList.toggle('on',j===i));
        }
      }
    });
  },{threshold:[0.2,0.6,0.9]});
  pages.forEach(p=>io.observe(p));
  pages[0].classList.add('in');

  // أسهم لوحة المفاتيح للتنقّل بين الصفحات
  let cur=0;
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowDown'||e.key==='PageDown'||e.key===' '){e.preventDefault();cur=Math.min(cur+1,pages.length-1);pages[cur].scrollIntoView({behavior:'smooth'});}
    if(e.key==='ArrowUp'||e.key==='PageUp'){e.preventDefault();cur=Math.max(cur-1,0);pages[cur].scrollIntoView({behavior:'smooth'});}
  });
  scroller.addEventListener('scroll',()=>{cur=Math.round(scroller.scrollTop/window.innerHeight);},{passive:true});

  // ملء الشاشة
  document.getElementById('fs').addEventListener('click',()=>{
    if(!document.fullscreenElement) document.documentElement.requestFullscreen?.();
    else document.exitFullscreen?.();
  });
</script>
</body>
</html>
